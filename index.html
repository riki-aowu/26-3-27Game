<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>仿生人养成计划</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- 🎵 日常音乐 -->
    <audio id="bgm-daily" loop preload="auto">
        <source src="assets/Daily.mp3" type="audio/mpeg">
    </audio>

    <!-- 🗺️ 地图音乐 -->
    <audio id="bgm-map" loop preload="auto">
        <source src="assets/Map.mp3" type="audio/mpeg">
    </audio>

    <div id="game-container">

        <div id="scene-layer">
            <div id="top-bar">
                <span id="date-display">2026年 1月 / 早</span>
                <span id="token">1000</span>
            </div>

            <div id="character-sprite">
                <img id="character-img" src="assets/Claude_Normal.png" alt="character" style="width:100%;height:100%;object-fit:contain;object-position:bottom;">
            </div>
        </div>

        <div class="msg-box">
            <div id="event-log">“User，准备好开始今天的计划了吗？”</div>
        </div>

        <div class="stats-panel" id="stats-ui"></div>

        <div class="action-bar">
            <button onclick="Game.doTalk()">💬 对话</button>
            <button onclick="Game.openMap()">📍 出行</button>
            <button class="primary-btn" onclick="Game.openSchedule()">📅 安排日程</button>
            <button onclick="Game.restDay()">🛌 在家休息</button>
            <button onclick="Game.saveGame()">💾 存档</button>
            <button onclick="Game.openLoadPanel()">📂 读档</button>
        </div>

    </div>

    <div id="modal-overlay" class="hidden">
        <div class="modal" id="modal-content"></div>
    </div>

    <!-- ✅ 顺序不能乱 -->
    <script src="data.js"></script>
    <script src="game.js"></script>

</body>
</html>
