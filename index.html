<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>仿生人养成计划</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="scene-layer">
            <div class="img-fallback">背景图片加载中...<br>(待上传: assets/bg_room.jpg)</div>
            <div id="character-sprite">
                <div class="img-fallback">人物立绘加载中...<br>(待上传: assets/claude_normal.png)</div>
            </div>
        </div>

        <div class="header">
            <div id="date-display">2026年 1月 / 早</div>
            <div class="currency">💰 <span id="token">1000</span></div>
        </div>

        <div class="msg-box">
            <div id="event-log">“User，准备好开始今天的计划了吗？”</div>
        </div>

        <div class="stats-panel" id="stats-ui">
            </div>

        <div class="action-bar">
            <button onclick="Game.doTalk()">💬 对话</button>
            <button onclick="Game.openMap()">📍 出行</button>
            <button class="primary-btn" onclick="Game.openSchedule()">📅 安排日程</button>
            <button onclick="Game.saveGame()">💾 存档</button>
        </div>
    </div>

    <div id="modal-overlay" class="hidden">
        <div class="modal" id="modal-content"></div>
    </div>

    <script src="data.js"></script>
    <script src="game.js"></script>
</body>
</html>
